# Combinatorica default settings
# These are applied when creating a new world with this game.

# Enable smooth lighting
smooth_lighting = true

# Player settings
enable_damage = true
creative_mode = false
enable_pvp = true

# Give starter items to new players
give_initial_stuff = true

# Map generation
mg_name = v7

# Hunger
hbhunger_enable = true

# Day/night cycle length (in seconds, default 72 minutes)
time_speed = 72
